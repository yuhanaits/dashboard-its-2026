<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS EPCC 2026 — Executive Performance Command Center</title>
<style>
:root{
  --navy:#0B2A4A; --navy2:#123A63; --steel:#1D5C99; --sky:#BFD7EE;
  --paper:#F4F7FB; --card:#FFFFFF; --ink:#17222E; --mut:#5B6B7C; --line:#DCE5F0;
  --ok:#1E8E5A; --ok-bg:#E4F4EC; --warn:#C98A00; --warn-bg:#FCF3DC; --bad:#C9372C; --bad-bg:#FBE7E4;
  --gold:#E0A526;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45}
.app{display:flex;min-height:100vh}
/* ============ SIDEBAR ============ */
.side{width:222px;background:var(--navy);color:#DCE8F5;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand .eyebrow{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:#8FB3D9}
.brand h1{font-size:1.05rem;font-weight:700;color:#fff;margin-top:4px;line-height:1.25}
.brand .sub{font-size:.68rem;color:#9FB8D2;margin-top:4px}
.nav{flex:1;overflow-y:auto;padding:10px 0}
.nav button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;color:#C4D6EA;padding:10px 16px;font:inherit;font-size:.85rem;cursor:pointer;text-align:left;border-left:3px solid transparent}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.on{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--gold);font-weight:600}
.nav .grp{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#6E8CAC;padding:14px 16px 4px}
.nav .badge{margin-left:auto;background:var(--bad);color:#fff;border-radius:9px;font-size:.65rem;padding:1px 7px;font-weight:700}
.twbox{padding:12px 16px;border-top:1px solid rgba(255,255,255,.12)}
.twbox label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:#8FB3D9;display:block;margin-bottom:6px}
.twseg{display:flex;gap:4px}
.twseg button{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#C4D6EA;border-radius:6px;padding:6px 0;font:inherit;font-size:.78rem;cursor:pointer}
.twseg button.on{background:var(--gold);border-color:var(--gold);color:#1F1500;font-weight:700}
.iobox{padding:10px 16px 16px;display:flex;gap:6px}
.iobox button{flex:1;background:none;border:1px solid rgba(255,255,255,.25);color:#C4D6EA;border-radius:6px;padding:5px 0;font-size:.7rem;cursor:pointer}
.iobox button:hover{border-color:#fff;color:#fff}
/* ============ MAIN ============ */
.main{flex:1;min-width:0;padding:22px 26px 60px}
.pagehead{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.pagehead h2{font-size:1.35rem;font-weight:700;color:var(--navy)}
.pagehead .meta{font-size:.78rem;color:var(--mut)}
.note{font-size:.78rem;color:var(--mut);margin:-8px 0 14px}
/* cockpit strip */
.cockpit{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:18px}
.tile{background:var(--navy);border-radius:10px;padding:13px 14px;color:#fff;position:relative;overflow:hidden}
.tile .lamp{position:absolute;top:11px;right:11px;width:13px;height:13px;border-radius:50%;box-shadow:0 0 8px 2px currentColor}
.tile .lamp.ok{background:#38D189;color:#38D189}.tile .lamp.warn{background:#FFC53D;color:#FFC53D}.tile .lamp.bad{background:#FF6B5B;color:#FF6B5B}
.tile .lamp.na{background:#51708F;color:transparent;box-shadow:none}
.tile .tl{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#9FC0E2}
.tile .tv{font-size:1.5rem;font-weight:700;margin-top:2px;line-height:1.1}
.tile .ts{font-size:.7rem;color:#BCD3EA;margin-top:3px}
/* cards & tables */
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px}
.card h3{font-size:.95rem;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h3 .k{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;background:var(--sky);color:var(--navy);padding:2px 8px;border-radius:4px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:1100px){.grid2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#EDF3FA;color:var(--navy);text-align:left;padding:7px 9px;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;border-bottom:2px solid var(--line);white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:top}
tr:hover td{background:#F7FAFD}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.ctr,th.ctr{text-align:center}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.68rem;font-weight:700;white-space:nowrap}
.pill.ok{background:var(--ok-bg);color:var(--ok)}.pill.warn{background:var(--warn-bg);color:var(--warn)}.pill.bad{background:var(--bad-bg);color:var(--bad)}.pill.na{background:#EEF1F5;color:var(--mut)}
.bar{height:7px;background:#E8EEF6;border-radius:4px;overflow:hidden;min-width:70px}
.bar i{display:block;height:100%;border-radius:4px}
.bar i.ok{background:var(--ok)}.bar i.warn{background:var(--gold)}.bar i.bad{background:var(--bad)}
input[type=number],input[type=text],input[type=date],select,textarea{font:inherit;font-size:.8rem;padding:5px 8px;border:1px solid #C6D3E2;border-radius:6px;background:#fff;color:var(--ink)}
input[type=number]{width:96px;text-align:right}
input:focus,select:focus,textarea:focus{outline:2px solid var(--steel);outline-offset:0;border-color:var(--steel)}
.btn{font:inherit;font-size:.78rem;font-weight:600;padding:7px 14px;border-radius:7px;border:1px solid var(--steel);background:var(--steel);color:#fff;cursor:pointer}
.btn:hover{background:var(--navy2)}
.btn.ghost{background:#fff;color:var(--steel)}
.btn.sm{padding:4px 10px;font-size:.72rem}
.btn.danger{background:#fff;border-color:var(--bad);color:var(--bad)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filters .chip{font-size:.74rem;padding:4px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--mut)}
.filters .chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.subseg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:14px}
.subseg button{font:inherit;font-size:.78rem;padding:7px 16px;border:0;background:#fff;color:var(--mut);cursor:pointer}
.subseg button.on{background:var(--navy);color:#fff;font-weight:600}
.help{font-size:.72rem;color:var(--mut)}
.savestate{position:fixed;bottom:14px;right:18px;background:var(--navy);color:#fff;font-size:.72rem;padding:6px 14px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50}
.savestate.show{opacity:.92}
.kpi-detail{background:#F2F7FC;border:1px solid var(--sky);border-radius:8px;padding:12px 14px;margin-top:8px;font-size:.8rem}
.flow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.76rem}
.flow .node{background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 10px}
.flow .node.hd{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}
.flow .arr{color:var(--mut)}
.two{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.empty{padding:22px;text-align:center;color:var(--mut);font-size:.82rem}
/* brief / print */
.brief{background:#fff;border:1px solid var(--line);border-radius:10px;padding:30px 36px;max-width:900px}
.brief h2{color:var(--navy);font-size:1.3rem;border-bottom:3px solid var(--gold);padding-bottom:8px;margin-bottom:4px}
.brief .bmeta{font-size:.75rem;color:var(--mut);margin-bottom:16px}
.brief h4{color:var(--navy);font-size:.9rem;margin:16px 0 6px;letter-spacing:.04em;text-transform:uppercase}
.brief ul{padding-left:20px;font-size:.83rem}
.brief li{margin-bottom:4px}
@media print{
  .side,.savestate,.noprint{display:none!important}
  .main{padding:0}
  body{background:#fff}
  .brief{border:0;padding:0;max-width:none}
  .card{break-inside:avoid}
}
@media(max-width:820px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:static}
  .nav{display:flex;flex-wrap:wrap}
  .nav button{width:auto;border-left:0;border-bottom:3px solid transparent}
  .nav button.on{border-bottom-color:var(--gold)}
  .nav .grp{display:none}
}
/* ============ LOGIN ============ */
.lock{position:fixed;inset:0;background:linear-gradient(160deg,#081F38 0%,#123A63 100%);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.lockcard{background:#fff;border-radius:14px;padding:30px 32px;max-width:430px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lockcard .eyebrow{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--steel)}
.lockcard h2{color:var(--navy);font-size:1.15rem;margin:4px 0 4px}
.lockcard p{font-size:.78rem;color:var(--mut);margin-bottom:14px}
.lockcard label{display:block;font-size:.72rem;font-weight:600;color:var(--navy);margin:10px 0 4px}
.lockcard input{width:100%;padding:9px 11px;font-size:.9rem}
.lockcard .btn{width:100%;margin-top:16px;padding:10px}
.lockcard .err{color:var(--bad);font-size:.75rem;margin-top:10px;min-height:1em}
.lockcard .foot{margin-top:14px;font-size:.7rem;color:var(--mut);text-align:center}
.lockcard .foot a{color:var(--steel);cursor:pointer;text-decoration:underline}
.rolebadge{display:inline-block;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;padding:2px 8px;border-radius:4px;font-weight:700;margin-top:6px}
.rolebadge.admin{background:var(--gold);color:#1F1500}
.rolebadge.viewer{background:var(--sky);color:var(--navy)}
body.ro #main input:not(.keep),body.ro #main select,body.ro #main textarea{background:#F0F3F7;pointer-events:none;border-color:var(--line)}
body.ro .mut{display:none!important}
</style>
</head>

async function rawGet(k){

  return null;
}
async function rawSet(k,v){
  if(window.storage){ try{ await window.storage.set(k,v); return true; }catch(e){ return false; } }
  if(hasLS){ localStorage.setItem(k,v); return true; }
  return false;
}

  if(hasLS) localStorage.removeItem(k);
}
/* ---- crypto (WebCrypto AES-256-GCM, kunci diturunkan PBKDF2) ---- */
const enc=new TextEncoder(), dec=new TextDecoder();
const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b)));
const ub64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function deriveKey(pass,salt){
  const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['wrapKey','unwrapKey']);
}
async function wrapDataKey(K,pass){
  const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12));
  const wk=await deriveKey(pass,salt);
  const ct=await crypto.subtle.wrapKey('raw',K,wk,{name:'AES-GCM',iv});
  return {salt:b64(salt),iv:b64(iv),ct:b64(ct)};
}
async function unwrapDataKey(w,pass){
  const wk=await deriveKey(pass,ub64(w.salt));
  return crypto.subtle.unwrapKey('raw',ub64(w.ct),wk,{name:'AES-GCM',iv:ub64(w.iv)},{name:'AES-GCM'},true,['encrypt','decrypt']);
}
async function encJSON(K,obj){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},K,enc.encode(JSON.stringify(obj)));
  return {iv:b64(iv),ct:b64(ct)};
}
async function decJSON(K,box){
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:ub64(box.iv)},K,ub64(box.ct));
  return JSON.parse(dec.decode(pt));
}

async function loadEnvelope(){

}
async function persistEnvelope(){
  if(!KEY||ROLE!=='admin'){ return; } // viewer tidak menulis data bersama
  ENV.data = await encJSON(KEY,S);

}
function save(){

document.getElementById('importfile').addEventListener('change',ev=>{

  const r=new FileReader();
  r.onload=async ()=>{
    try{
      const j=JSON.parse(r.result);
      if(j.type==='epcc-its-2026'&&j.data&&j.wraps){
        // file terenkripsi: coba buka dengan kunci sesi; jika beda set kata sandi, minta kata sandi file

          d=await decJSON(k,j.data);
        }
        applyState(d);
      } else {

  if(!el){ el=document.createElement('div'); el.id='lock'; el.className='lock'; document.body.appendChild(el); }
  if(mode==='setup'){
    el.innerHTML='<div class="lockcard"><div class="eyebrow">ITS EPCC 2026 · Penyiapan Awal</div><h2>Buat Kata Sandi Akses</h2>'+
    '<p>Data capaian akan dienkripsi (AES-256). Buat dua kata sandi: <b>Input</b> untuk pengisi data, dan <b>Pemantau</b> (baca-saja) untuk Rektor & para WR. Simpan baik-baik — <b>tidak ada pemulihan kata sandi</b>.</p>'+
    '<label>Kata sandi Input (admin)</label><input type="password" id="sp1" autocomplete="new-password">'+
    '<label>Ulangi kata sandi Input</label><input type="password" id="sp1b" autocomplete="new-password">'+
    '<label>Kata sandi Pemantau (Rektor/WR, baca-saja)</label><input type="password" id="sp2" autocomplete="new-password">'+
    '<button class="btn" onclick="doSetup()">Aktifkan & Masuk</button><div class="err" id="lerr">'+(msg||'')+'</div></div>';
  } else {
    el.innerHTML='<div class="lockcard"><div class="eyebrow">Institut Teknologi Sepuluh Nopember</div><h2>Executive Performance Command Center 2026</h2>'+
    '<p>Masukkan kata sandi. Kata sandi <b>Input</b> membuka mode pengisian; kata sandi <b>Pemantau</b> membuka mode baca-saja untuk pimpinan.</p>'+
    '<label>Kata sandi</label><input type="password" id="lp" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')doLogin()">'+
    '<button class="btn" onclick="doLogin()">Masuk</button><div class="err" id="lerr">'+(msg||'')+'</div>'+
    '<div class="foot"><a onclick="resetAll()">Reset semua data & kata sandi</a></div></div>';
  }
  el.style.display='flex';
  setTimeout(()=>{const i=el.querySelector('input'); if(i)i.focus();},50);
}
function unlock(){ const el=document.getElementById('lock'); if(el)el.style.display='none'; }
window.doSetup=async ()=>{
  const p1=document.getElementById('sp1').value, p1b=document.getElementById('sp1b').value, p2=document.getElementById('sp2').value;
  const err=document.getElementById('lerr');
  if(p1.length<6||p2.length<6){ err.textContent='Kata sandi minimal 6 karakter.'; return; }
  if(p1!==p1b){ err.textContent='Kata sandi Input tidak sama.'; return; }
  if(p1===p2){ err.textContent='Kata sandi Input dan Pemantau harus berbeda.'; return; }
  const K=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);
  ENV={v:1,type:'epcc-its-2026',wraps:{admin:await wrapDataKey(K,p1),viewer:await wrapDataKey(K,p2)},data:null};
  KEY=K; ROLE='admin';
  // migrasi data lama tanpa enkripsi jika ada
  const old=await rawGet('epcc-its-2026');
  if(old){ try{ applyState(JSON.parse(old)); }catch(e){} await rawDel('epcc-its-2026'); }
  await persistEnvelope();
  unlock(); render(); flash('Enkripsi aktif ✓');
};
window.doLogin=async ()=>{
  const p=document.getElementById('lp').value, err=document.getElementById('lerr');
  try{ KEY=await unwrapDataKey(ENV.wraps.admin,p); ROLE='admin'; }
  catch(e){
    try{ KEY=await unwrapDataKey(ENV.wraps.viewer,p); ROLE='viewer'; }
    catch(e2){ err.textContent='Kata sandi salah.'; return; }
  }
  try{ if(ENV.data) applyState(await decJSON(KEY,ENV.data)); }catch(e){ err.textContent='Data rusak / tidak dapat dibuka.'; return; }
  unlock(); render();
};
window.logout=()=>{ KEY=null; ROLE=null; S=JSON.parse(JSON.stringify(BLANK)); lockScreen('login'); };
window.resetAll=async ()=>{
  if(!confirm('Yakin? SELURUH data capaian dan kata sandi akan dihapus permanen dari perangkat ini.'))return;
  await rawDel(KS); await rawDel('epcc-its-2026'); ENV=null; KEY=null; ROLE=null; S=JSON.parse(JSON.stringify(BLANK));
  lockScreen('setup');
};
/* ================= helpers ================= */
const fmtRp = n => n==null?'–':'Rp'+Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const fmt1 = n => n==null?'–':(Math.round(n*100)/100).toString().replace('.',',');
const pct = n => n==null?'–':(Math.round(n*10)/10).toString().replace('.',',')+'%';
function num(s){ if(s==null)return null; s=String(s).trim().replace(/%/g,'').replace(/\s/g,'');
  if(/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(s)) return parseFloat(s.replace(/\./g,'').replace(',','.'));
  if(/^\d+(,\d+)?$/.test(s)) return parseFloat(s.replace(',','.'));
  if(/^\d+(\.\d+)?$/.test(s)) return parseFloat(s);
  return null; }
function getVal(kind,id){ const v=S.tw[S.activeTW][kind][id]; return (v===''||v==null)?null:parseFloat(v); }
function lastVal(kind,id){ for(let t=S.activeTW;t>=1;t--){ const v=S.tw[t][kind][id]; if(v!==''&&v!=null) return {v:parseFloat(v),t}; } return null; }
function progress(ind,val){
  const b=ind.b,t=ind.t;
  if(val==null||t==null) return null;
  if(ind.dir<0){
    if(b==null||b<=t) return val<=t?1:Math.max(0,t/val);
    return Math.min(1.3,Math.max(0,(b-val)/(b-t)));
  }
  if(b==null||t<=b) return Math.min(1.3,val/t);
  return Math.min(1.3,Math.max(0,(val-b)/(t-b)));
}
function statusOf(ind,kind){
  // manual override for non-numeric targets
  if(ind.t==null){ const m=S.tw[S.activeTW].man[kind+':'+ind.id]; return m||null; }
  const lv=lastVal(kind,ind.id); if(!lv) return null;
  const p=progress(ind,lv.v); if(p==null) return null;
  const expected=S.activeTW/4;
  const r=p/expected;
  return r>=0.9?'ok':(r>=0.6?'warn':'bad');
}
function grpStatus(g){
  const lv=lastVal('grp',g.id); if(!lv) return null;
  const p=lv.v/g.pagu; const expected=S.activeTW/4; const r=p/expected;
  return r>=0.9?'ok':(r>=0.6?'warn':'bad');
}
/* --- pembangunan & pengadaan --- */
const TAHAP=['Perencanaan','Tender/Seleksi','Kontrak','Pelaksanaan','Serah Terima'];
function sprGet(id){ // gabungan nilai terakhir s.d. TW aktif
  let out={r:null,f:null,th:'',t:null};
  for(let t=1;t<=S.activeTW;t++){
    const o=S.tw[t].spr[id]; if(!o)continue;
    if(o.r!==''&&o.r!=null){out.r=parseFloat(o.r);out.t=t;}
    if(o.f!==''&&o.f!=null){out.f=parseFloat(o.f);out.t=t;}
    if(o.th){out.th=o.th;}
  }
  return out;
}
function sprStatus(it){
  const v=sprGet(it.id);
  if(v.r==null&&v.f==null) return null;
  const expected=S.activeTW/4;
  const ratios=[];
  if(v.r!=null) ratios.push((v.r/it.pagu)/expected);
  if(v.f!=null) ratios.push((v.f/100)/expected);
  const r=Math.min(...ratios); // status mengikuti dimensi terlemah (Bab 8.4)
  return r>=0.9?'ok':(r>=0.6?'warn':'bad');
}
function sprAgg(list){
  let pagu=0,real=0,fw=0,fp=0;
  list.forEach(it=>{ pagu+=it.pagu; const v=sprGet(it.id); if(v.r!=null)real+=v.r; if(v.f!=null){fw+=v.f*it.pagu;fp+=it.pagu;} });
  return {pagu,real,fisik:fp?fw/fp:null};
}
function forecast(ind,kind){
  const lv=lastVal(kind,ind.id); if(!lv||ind.t==null) return null;
  const frac=lv.t/4, b=ind.b;
  if(ind.dir<0){ if(b==null) return lv.v; return Math.max(0,b-(b-lv.v)/frac); }
  if(b==null) return lv.v/frac;
  return b+(lv.v-b)/frac;
}
function counts(list,kind){
  const c={ok:0,warn:0,bad:0,na:0};
  list.forEach(x=>{ const s=statusOf(x,kind); c[s||'na']++; });
  return c;
}
const pillHtml = s => s?('<span class="pill '+s+'">'+({ok:'Hijau',warn:'Kuning',bad:'Merah'}[s])+'</span>'):'<span class="pill na">Belum diisi</span>';
const lamp = s => '<span class="lamp '+(s||'na')+'"></span>';
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function redCount(){
  let n=0;
  DATA.IKU.forEach(x=>{ if(statusOf(x,'iku')==='bad')n++; });
  DATA.IKS.forEach(x=>{ if(statusOf(x,'iks')==='bad')n++; });
  DATA.GRP.forEach(g=>{ if(grpStatus(g)==='bad')n++; });
  DATA.SPR.forEach(p=>{ if(sprStatus(p)==='bad')n++; });
  return n;
}
function renderNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  PAGES.forEach(p=>{

/* ---------- COCKPIT ---------- */
function rankTile(label,kind,id){
  const list = kind==='iku'?DATA.IKU:DATA.IKS;
  const ind=list.find(x=>x.id===id);
  if(!ind) return '';
  const lv=lastVal(kind,ind.id);
  const st=statusOf(ind,kind);
  const gap=(lv&&ind.t!=null)?(ind.dir<0? lv.v-ind.t : ind.t-lv.v):null;
  return '<div class="tile">'+lamp(st)+'<div class="tl">'+label+'</div><div class="tv">'+(lv?fmt1(lv.v):'–')+'</div><div class="ts">Target '+esc(ind.target)+(gap!=null?' · Gap '+fmt1(gap):'')+'</div></div>';
}
function cockpit(){
  const tot=DATA.GRP.reduce((a,g)=>{const lv=lastVal('grp',g.id);return a+(lv?lv.v:0);},0);
  const ser=tot/DATA.TOTAL*100, targetSer=S.activeTW*25;
  const serSt = tot===0?null:(ser/targetSer>=0.9?'ok':ser/targetSer>=0.6?'warn':'bad');
  const cu=counts(DATA.IKU,'iku'), cs=counts(DATA.IKS,'iks');
  const ikuSt=cu.bad>0?'bad':cu.warn>0?'warn':(cu.ok>0?'ok':null);
  const iksSt=cs.bad>0?'bad':cs.warn>0?'warn':(cs.ok>0?'ok':null);
  let h=head('Executive Cockpit','· ringkasan 10 detik');
  h+='<div class="cockpit">';
  h+='<div class="tile">'+lamp(serSt)+'<div class="tl">Serapan RKAT</div><div class="tv">'+pct(ser)+'</div><div class="ts">'+fmtRp(tot)+' · target linear '+targetSer+'%</div></div>';
  h+='<div class="tile">'+lamp(ikuSt)+'<div class="tl">IKU</div><div class="tv">'+cu.ok+'<span style="font-size:.8rem;font-weight:400">/'+DATA.IKU.length+' hijau</span></div><div class="ts">'+cu.warn+' kuning · '+cu.bad+' merah · '+cu.na+' belum diisi</div></div>';
  h+='<div class="tile">'+lamp(iksSt)+'<div class="tl">IKS</div><div class="tv">'+cs.ok+'<span style="font-size:.8rem;font-weight:400">/'+DATA.IKS.length+' hijau</span></div><div class="ts">'+cs.warn+' kuning · '+cs.bad+' merah · '+cs.na+' belum diisi</div></div>';
  h+=rankTile('QS WUR','iku',DATA.QS_ID)+rankTile('THE Impact','iku','U_THE')+rankTile('UI GreenMetric','iks','IKS 41');
  const sa=sprAgg(DATA.SPR);
  const sprSt = (sa.real===0&&sa.fisik==null)?null:(()=>{const e=S.activeTW/4;const rs=[];if(sa.real>0)rs.push((sa.real/sa.pagu)/e);if(sa.fisik!=null)rs.push((sa.fisik/100)/e);const r=Math.min(...rs);return r>=0.9?'ok':r>=0.6?'warn':'bad';})();
  h+='<div class="tile">'+lamp(sprSt)+'<div class="tl">Pembangunan & Pengadaan</div><div class="tv">'+(sa.fisik==null?'–':pct(sa.fisik))+'</div><div class="ts">fisik rerata · serapan '+pct(sa.real/sa.pagu*100)+' dari '+fmtRp(sa.pagu)+'</div></div>';
  h+='</div>';
  // top prioritas & risk
  h+='<div class="grid2">';
  h+='<div class="card"><h3><span class="k">Panel 2</span>Top Prioritas Minggu Ini</h3>'+prioTable(true)+'</div>';
  h+='<div class="card"><h3><span class="k">Panel 3</span>Top Strategic Risk (RKAT Subbab 2.5)</h3>'+riskMini()+'</div>';
  h+='</div>';
  // forecast
  h+='<div class="card"><h3><span class="k">Panel 5</span>Forecast — proyeksi akhir tahun jika tren berlanjut</h3>'+forecastTable()+'</div>';
  // decision mini
  const open=S.keputusan.filter(k=>!k.done).length;
  h+='<div class="card"><h3><span class="k">Panel 4</span>Keputusan Menunggu Pimpinan <span class="pill '+(open?'bad':'ok')+'">'+open+' terbuka</span></h3>'+decisionList(true)+'</div>';
  return h;
}
function prioTable(mini){
  if(!S.prioritas.length) return '<div class="empty">Belum ada prioritas. Tambahkan lewat halaman <b>Panel Aksi & Keputusan</b>.</div>';
  let h='<table><tr><th>Prioritas</th><th>PIC</th><th>Deadline</th><th class="ctr">Status</th>'+(mini?'':'<th></th>')+'</tr>';
  S.prioritas.forEach((p,i)=>{
    h+='<tr><td>'+esc(p.judul)+'</td><td>'+esc(p.pic)+'</td><td>'+esc(p.deadline||'–')+'</td><td class="ctr">'+pillHtml(p.status)+'</td>';
    if(!mini) h+='<td><button class="btn sm danger mut" onclick="delPrio('+i+')">Hapus</button></td>';
    h+='</tr>';
  });
  return h+'</table>';
}
function riskMini(){
  let h='<table><tr><th>Area / IKU</th><th class="ctr">Level Awal</th><th class="ctr">Residual</th></tr>';
  DATA.RISIKO.forEach(r=>{ h+='<tr><td>'+esc(r[0])+'</td><td class="ctr"><span class="pill bad">'+esc(r[2])+'</span></td><td class="ctr"><span class="pill '+(r[4]==='Sedang'?'warn':'bad')+'">'+esc(r[4])+'</span></td></tr>'; });
  return h+'</table><p class="help" style="margin-top:8px">Sembilan risiko utama RKAT 2026 — seluruhnya level <b>Sangat Tinggi</b> sebelum mitigasi. Detail pada halaman Panel Risiko.</p>';
}
function forecastTable(){
  const rows=[];
  const picks=[DATA.QS_ID].filter(Boolean).map(id=>DATA.IKU.find(x=>x.id===id)).filter(Boolean);
  DATA.IKU.forEach(x=>{ if(!picks.includes(x)&&lastVal('iku',x.id)&&x.t!=null) rows.push(x); });
  const all=picks.filter(x=>lastVal('iku',x.id)).concat(rows).slice(0,10);
  if(!all.length) return '<div class="empty">Isi capaian IKU terlebih dahulu untuk melihat proyeksi.</div>';
  let h='<table><tr><th>Indikator</th><th class="num">Baseline</th><th class="num">Capaian TW'+S.activeTW+'</th><th class="num">Proyeksi Akhir Tahun</th><th class="num">Target</th><th class="ctr">Prognosis</th></tr>';
  all.forEach(x=>{
    const lv=lastVal('iku',x.id), fc=forecast(x,'iku');
    const hit = fc!=null && (x.dir<0? fc<=x.t : fc>=x.t);
    h+='<tr><td>'+esc(x.name)+'</td><td class="num">'+esc(x.baseline)+'</td><td class="num">'+fmt1(lv.v)+'</td><td class="num"><b>'+fmt1(fc)+'</b></td><td class="num">'+esc(x.target)+'</td><td class="ctr">'+(fc==null?'<span class="pill na">–</span>':hit?'<span class="pill ok">Tercapai</span>':'<span class="pill bad">Berisiko</span>')+'</td></tr>';
  });
  return h+'</table><p class="help" style="margin-top:8px">Proyeksi linear sederhana: capaian dinormalisasi terhadap proporsi triwulan berjalan ('+(S.activeTW*25)+'% tahun).</p>';
}
/* ---------- COMMAND / DECISION ---------- */
function command(){
  let h=head('Panel Aksi & Keputusan','· Command Center');
  // red/yellow indicators with drill-down
  const items=[];
  DATA.IKU.forEach(x=>{const s=statusOf(x,'iku'); if(s==='bad'||s==='warn')items.push({kind:'iku',ind:x,s});});
  DATA.IKS.forEach(x=>{const s=statusOf(x,'iks'); if(s==='bad'||s==='warn')items.push({kind:'iks',ind:x,s});});
  DATA.GRP.forEach(g=>{const s=grpStatus(g); if(s==='bad'||s==='warn')items.push({kind:'grp',ind:g,s});});
  DATA.SPR.forEach(p=>{const s=sprStatus(p); if(s==='bad'||s==='warn')items.push({kind:'spr',ind:p,s});});
  items.sort((a,b)=>(a.s==='bad'?0:1)-(b.s==='bad'?0:1));
  h+='<div class="card"><h3><span class="k">Panel 7</span>Indikator Butuh Tindakan ('+items.length+')</h3>';
  if(!items.length) h+='<div class="empty">Tidak ada indikator berstatus kuning/merah pada TW'+S.activeTW+'. 👍</div>';
  else{
    h+='<p class="help" style="margin-bottom:10px">Klik indikator merah/kuning: isi penyebab, PIC penanganan, rekomendasi, dan kebutuhan keputusan Rektor. Catatan tersimpan otomatis.</p>';
    items.forEach(it=>{
      const key=it.kind+':'+(it.ind.id), n=S.catatan[key]||{};
      const nm = it.kind==='grp'? it.ind.label : it.ind.name;

      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
      h+='<label class="help">Penyebab<br><input type="text" style="width:100%" data-note="'+key+':penyebab" value="'+esc(n.penyebab||'')+'"></label>';
      h+='<label class="help">PIC penanganan'+(it.kind==='iks'?' (default: '+esc(pic)+')':'')+'<br><input type="text" style="width:100%" data-note="'+key+':pic" value="'+esc(n.pic||'')+'"></label>';
      h+='<label class="help">Rekomendasi<br><input type="text" style="width:100%" data-note="'+key+':rekom" value="'+esc(n.rekom||'')+'"></label>';
      h+='<label class="help">Kebutuhan keputusan Rektor<br><input type="text" style="width:100%" data-note="'+key+':keputusan" value="'+esc(n.keputusan||'')+'"></label>';
      h+='</div></div>';
    });
  }
  h+='</div>';
  // prioritas editor
  h+='<div class="grid2">';
  h+='<div class="card"><h3><span class="k">Panel 2</span>Top Prioritas Minggu Ini</h3>'+prioTable(false);
  h+='<div class="mut" style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap"><input type="text" id="pJudul" placeholder="Prioritas…" style="flex:2;min-width:150px"><input type="text" id="pPic" placeholder="PIC" style="flex:1;min-width:80px"><input type="date" id="pDl"><select id="pSt"><option value="ok">Hijau</option><option value="warn" selected>Kuning</option><option value="bad">Merah</option></select><button class="btn sm" onclick="addPrio()">Tambah</button></div></div>';
  // decision editor
  h+='<div class="card"><h3><span class="k">Panel 4</span>Decision Panel</h3>'+decisionList(false);
  h+='<div class="mut" style="display:flex;gap:6px;margin-top:10px"><input type="text" id="kText" placeholder="Keputusan yang perlu diambil pimpinan…" style="flex:1"><button class="btn sm" onclick="addKep()">Tambah</button></div></div>';
  h+='</div>';
  return h;
}
function decisionList(mini){
  if(!S.keputusan.length) return '<div class="empty">Belum ada butir keputusan.</div>';
  let h='';
  S.keputusan.forEach((k,i)=>{

    h+='<tr><td><b>'+esc(r[0])+'</b></td><td>'+esc(r[1])+'</td><td class="ctr"><span class="pill bad">'+esc(r[2])+'</span></td><td>'+esc(r[3])+'</td><td class="ctr"><span class="pill '+(r[4]==='Sedang'?'warn':'bad')+'">'+esc(r[4])+'</span></td></tr>';
  });
  h+='</table></div>';
  h+='<div class="card"><h3>Program Dominan — Pengawasan Intensif (Bab 8.5)</h3><table><tr><th>Program Teknis</th><th class="num">Porsi Anggaran</th></tr>';
  [['Peningkatan kesejahteraan SDM','24,80%'],['Penguatan tata kelola pelaksanaan kerjasama industri','22,45%'],['Peningkatan pendanaan riset yang kompetitif','16,72%'],['Penguatan fasilitas pendukung akademik','15,41%']].forEach(r=>{
    h+='<tr><td>'+r[0]+'</td><td class="num"><b>'+r[1]+'</b></td></tr>';});
  return h+'</table></div>';
}
/* ---------- BRIEF ---------- */
function brief(){
  const tot=DATA.GRP.reduce((a,g)=>{const lv=lastVal('grp',g.id);return a+(lv?lv.v:0);},0);
  const cu=counts(DATA.IKU,'iku'), cs=counts(DATA.IKS,'iks');
  const now=new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const reds=[]; DATA.IKU.forEach(x=>{if(statusOf(x,'iku')==='bad')reds.push(x.group+' — '+x.name);});
  DATA.IKS.forEach(x=>{if(statusOf(x,'iks')==='bad')reds.push(x.id+' — '+x.name);});
  const fcMiss=[]; DATA.IKU.forEach(x=>{const fc=forecast(x,'iku'); if(fc!=null&&x.t!=null&&!(x.dir<0?fc<=x.t:fc>=x.t))fcMiss.push(x.name+' (proyeksi '+fmt1(fc)+' vs target '+x.target+')');});
  let h=head('Executive Brief','· Panel 8')+'<p class="note noprint">Ringkasan dua halaman otomatis. Klik <b>Cetak / PDF</b> untuk menghasilkan dokumen brief mingguan.</p>';
  h+='<button class="btn noprint" style="margin-bottom:14px" onclick="window.print()">🖨 Cetak / PDF</button>';
  h+='<div class="brief"><h2>Executive Brief — Kinerja ITS 2026</h2><div class="bmeta">Triwulan '+S.activeTW+' · dihasilkan '+now+' · ITS Executive Performance Command Center</div>';
  h+='<h4>1 · Ringkasan Eksekutif</h4><ul>';
  h+='<li>Serapan RKAT: <b>'+pct(tot/DATA.TOTAL*100)+'</b> ('+fmtRp(tot)+' dari pagu '+fmtRp(DATA.TOTAL)+'); target linear TW'+S.activeTW+' adalah '+(S.activeTW*25)+'%.</li>';
  h+='<li>IKU: <b>'+cu.ok+' hijau</b>, '+cu.warn+' kuning, '+cu.bad+' merah dari '+DATA.IKU.length+' indikator ('+cu.na+' belum diisi).</li>';
  h+='<li>IKS: <b>'+cs.ok+' hijau</b>, '+cs.warn+' kuning, '+cs.bad+' merah dari '+DATA.IKS.length+' indikator ('+cs.na+' belum diisi).</li></ul>';
  h+='<h4>2 · Indikator Merah (butuh keputusan)</h4>'+(reds.length?'<ul>'+reds.map(r=>'<li>'+esc(r)+'</li>').join('')+'</ul>':'<p class="help">Tidak ada indikator merah.</p>');
  h+='<h4>3 · Prognosis Berisiko Tidak Tercapai</h4>'+(fcMiss.length?'<ul>'+fcMiss.map(r=>'<li>'+esc(r)+'</li>').join('')+'</ul>':'<p class="help">Seluruh proyeksi indikator terisi berada pada jalur target.</p>');
  h+='<h4>4 · Pembangunan & Pengadaan Terpusat</h4>';
  {
    const all=sprAgg(DATA.SPR);
    const sred=DATA.SPR.filter(it=>sprStatus(it)==='bad');
    h+='<ul><li>Serapan anggaran pembangunan/pengadaan: <b>'+pct(all.real/all.pagu*100)+'</b> ('+fmtRp(all.real)+' dari pagu '+fmtRp(all.pagu)+'); fisik rerata tertimbang '+(all.fisik==null?'belum diisi':pct(all.fisik))+'.</li>';
    h+=sred.length?('<li>Item berstatus merah: '+sred.map(x=>esc(x.name)).join('; ')+'.</li>'):'<li>Tidak ada item pembangunan/pengadaan berstatus merah.</li>';
    h+='</ul>';
  }
  h+='<h4>5 · Prioritas Minggu Ini</h4>'+(S.prioritas.length?'<ul>'+S.prioritas.map(p=>'<li>'+esc(p.judul)+' — PIC '+esc(p.pic||'–')+(p.deadline?', tenggat '+esc(p.deadline):'')+'</li>').join('')+'</ul>':'<p class="help">Belum ada butir prioritas.</p>');
  h+='<h4>6 · Keputusan Menunggu Pimpinan</h4>'+(S.keputusan.filter(k=>!k.done).length?'<ul>'+S.keputusan.filter(k=>!k.done).map(k=>'<li>☐ '+esc(k.text)+'</li>').join('')+'</ul>':'<p class="help">Tidak ada keputusan terbuka.</p>');
  h+='<h4>7 · Catatan Risiko</h4><ul><li>Sembilan risiko RKAT (level Sangat Tinggi) tetap dipantau; fokus pengawasan pada empat program dominan: kesejahteraan SDM (24,80%), kerjasama industri (22,45%), pendanaan riset (16,72%), fasilitas akademik (15,41%).</li></ul>';
  h+='</div>';
  return h;
}
/* ---------- input binding ---------- */
function bindInputs(root){
  if(ROLE!=='admin') return; // viewer: baca saja
  root.querySelectorAll('[data-in]').forEach(el=>{
    el.addEventListener('change',()=>{
      const [kind,id]=el.dataset.in.split(/:(.+)/);
      S.tw[S.activeTW][kind][id]=el.value;
      save();
      // refresh status pills without full rerender for smoother typing: full render is fine on change
      render();
    });
  });
  root.querySelectorAll('[data-spr]').forEach(el=>{
    el.addEventListener('change',()=>{
      const [id,field]=el.dataset.spr.split(/:(?=[rf]$|th$)/);
      S.tw[S.activeTW].spr[id]=S.tw[S.activeTW].spr[id]||{};
      S.tw[S.activeTW].spr[id][field]=el.value;
      save(); render();
    });
  });
  root.querySelectorAll('[data-man]').forEach(el=>{
    el.addEventListener('change',()=>{
      const key=el.dataset.man;
      S.tw[S.activeTW].man[key]=el.value;
      save(); render();
    });
  });
  root.querySelectorAll('[data-note]').forEach(el=>{
    el.addEventListener('change',()=>{
      const parts=el.dataset.note.split(':'); const field=parts.pop(); const key=parts.join(':');
      S.catatan[key]=S.catatan[key]||{}; S.catatan[key][field]=el.value; save();
    });
  });
}
/* ---------- boot ---------- */
(async ()=>{
  if(!window.crypto||!crypto.subtle){
    document.body.innerHTML='<div style="padding:40px;font-family:sans-serif">Browser tidak mendukung Web Crypto. Buka lewat HTTPS (atau file lokal) dengan browser modern.</div>';
    return;
  }
  await loadEnvelope();
  render();
  lockScreen(ENV?'login':'setup');
})();
